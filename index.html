<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Simulado ENEM - Linguagens e Humanas</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: #f4f7fb;
      color: #172033;
    }

    header {
      background: #1f5eff;
      color: white;
      padding: 22px 18px;
      text-align: center;
    }

    header h1 {
      margin: 0 0 6px;
      font-size: 26px;
    }

    header p {
      margin: 0;
      opacity: 0.92;
    }

    main {
      max-width: 1100px;
      margin: 24px auto;
      padding: 0 16px;
      display: grid;
      grid-template-columns: 1fr 280px;
      gap: 18px;
    }

    .card {
      background: white;
      border: 1px solid #dce4f2;
      border-radius: 8px;
      padding: 18px;
      box-shadow: 0 8px 24px rgba(15, 35, 80, 0.06);
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: center;
      margin-bottom: 14px;
      flex-wrap: wrap;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 7px 10px;
      border-radius: 999px;
      background: #eef3ff;
      color: #244bb8;
      font-weight: 700;
      font-size: 13px;
    }

    .progress {
      height: 10px;
      background: #e6edf8;
      border-radius: 999px;
      overflow: hidden;
      margin: 10px 0 18px;
    }

    .progress span {
      display: block;
      height: 100%;
      width: 0%;
      background: #1f5eff;
      transition: width 0.2s ease;
    }

    .question h2 {
      font-size: 19px;
      margin: 0 0 12px;
      line-height: 1.35;
    }

    .context {
      background: #f7f9fd;
      border-left: 4px solid #1f5eff;
      padding: 12px;
      border-radius: 6px;
      margin-bottom: 14px;
      line-height: 1.5;
      color: #2f3b52;
    }

    .options {
      display: grid;
      gap: 10px;
      margin-top: 16px;
    }

    .option {
      border: 1px solid #ccd7e8;
      border-radius: 8px;
      padding: 12px;
      cursor: pointer;
      background: white;
      transition: 0.15s ease;
      line-height: 1.4;
    }

    .option:hover {
      border-color: #1f5eff;
      background: #f5f8ff;
    }

    .option.selected {
      background: #eaf0ff;
      border-color: #1f5eff;
      color: #113997;
      font-weight: 700;
    }

    .actions {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      margin-top: 18px;
      flex-wrap: wrap;
    }

    button {
      border: 0;
      border-radius: 8px;
      padding: 11px 15px;
      font-weight: 700;
      cursor: pointer;
      background: #1f5eff;
      color: white;
    }

    button.secondary {
      background: #e8eef8;
      color: #1c2d4f;
    }

    button.danger {
      background: #e54848;
    }

    button:disabled {
      opacity: 0.45;
      cursor: not-allowed;
    }

    aside {
      position: sticky;
      top: 14px;
      align-self: start;
    }

    .stats {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-bottom: 14px;
    }

    .stat {
      background: #f7f9fd;
      border-radius: 8px;
      padding: 10px;
      text-align: center;
    }

    .stat strong {
      display: block;
      font-size: 20px;
      color: #1f5eff;
    }

    .palette {
      display: grid;
      grid-template-columns: repeat(6, 1fr);
      gap: 7px;
      margin-top: 12px;
    }

    .qbtn {
      padding: 8px 0;
      border-radius: 6px;
      font-size: 12px;
      background: #edf2fa;
      color: #20304d;
    }

    .qbtn.answered {
      background: #1f5eff;
      color: white;
    }

    .qbtn.current {
      outline: 3px solid #ffcb3d;
    }

    .result {
      display: none;
    }

    .result-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 12px;
      margin: 16px 0;
    }

    .big-stat {
      background: #f7f9fd;
      border-radius: 8px;
      padding: 16px;
      text-align: center;
    }

    .big-stat strong {
      display: block;
      font-size: 28px;
      margin-bottom: 4px;
    }

    .correct {
      color: #16824a;
    }

    .wrong {
      color: #d33333;
    }

    .review {
      margin-top: 18px;
      display: grid;
      gap: 10px;
    }

    .review-item {
      border: 1px solid #dce4f2;
      border-radius: 8px;
      padding: 12px;
      background: #fbfcff;
    }

    .review-item strong {
      display: block;
      margin-bottom: 6px;
    }

    @media (max-width: 850px) {
      main {
        grid-template-columns: 1fr;
      }

      aside {
        position: static;
      }

      .result-grid {
        grid-template-columns: 1fr 1fr;
      }
    }
  </style>
</head>

  <header>
    <h1>Simulado ENEM</h1>
    <p>90 questões de Linguagens e Ciências Humanas com resultado final</p>
  </header>

  <main>
    <section class="card" id="exam">
      <div class="topbar">
        <span class="badge" id="areaBadge">Questão</span>
        <span class="badge" id="answeredBadge">0 de 90 respondidas</span>
      </div>

      <div class="progress"><span id="progressBar"></span></div>

      <div class="question">
        <h2 id="questionTitle"></h2>
        <div class="context" id="questionContext"></div>
        <div class="options" id="options"></div>
      </div>

      <div class="actions">
        <button class="secondary" id="prevBtn">Anterior</button>
        <button class="secondary" id="nextBtn">Próxima</button>
        <button class="danger" id="finishBtn">Finalizar simulado</button>
      </div>
    </section>

    <aside class="card" id="sidebar">
      <div class="stats">
        <div class="stat">
          <strong id="currentNumber">1</strong>
          atual
        </div>
        <div class="stat">
          <strong id="answeredCount">0</strong>
          feitas
        </div>
      </div>
      <strong>Mapa de questões</strong>
      <div class="palette" id="palette"></div>
    </aside>

    <section class="card result" id="result">
      <h2>Resultado final</h2>
      <p>Confira seu desempenho geral e revise as questões que errou.</p>

      <div class="result-grid">
        <div class="big-stat">
          <strong id="scoreTotal">0</strong>
          acertos
        </div>
        <div class="big-stat">
          <strong id="wrongTotal">0</strong>
          erros
        </div>
        <div class="big-stat">
          <strong id="blankTotal">0</strong>
          em branco
        </div>
        <div class="big-stat">
          <strong id="percentTotal">0%</strong>
          aproveitamento
        </div>
      </div>

      <div class="actions">
        <button id="restartBtn">Refazer simulado</button>
      </div>

      <div class="review" id="review"></div>
    </section>
  </main>

    const questions = themes.map((q, index) => ({
      ...q,
      id: index + 1
    }));

    let current = 0;
    let answers = Array(questions.length).fill(null);

    const exam = document.getElementById("exam");
    const sidebar = document.getElementById("sidebar");
    const result = document.getElementById("result");
    const areaBadge = document.getElementById("areaBadge");
    const answeredBadge = document.getElementById("answeredBadge");
    const progressBar = document.getElementById("progressBar");
    const questionTitle = document.getElementById("questionTitle");
    const questionContext = document.getElementById("questionContext");
    const optionsEl = document.getElementById("options");
    const prevBtn = document.getElementById("prevBtn");
    const nextBtn = document.getElementById("nextBtn");
    const finishBtn = document.getElementById("finishBtn");
    const currentNumber = document.getElementById("currentNumber");
    const answeredCount = document.getElementById("answeredCount");
    const palette = document.getElementById("palette");
    const restartBtn = document.getElementById("restartBtn");

    function renderPalette() {
      palette.innerHTML = "";
      questions.forEach((q, i) => {
        const btn = document.createElement("button");
        btn.className = "qbtn";
        if (answers[i] !== null) btn.classList.add("answered");
        if (i === current) btn.classList.add("current");
        btn.textContent = q.id;
        btn.onclick = () => {
          current = i;
          render();
        };
        palette.appendChild(btn);
      });
    }

    function render() {
      const q = questions[current];
      const answered = answers.filter(a => a !== null).length;

      areaBadge.textContent = `Questão ${q.id} • ${q.area} • ${q.topic}`;
      answeredBadge.textContent = `${answered} de ${questions.length} respondidas`;
      progressBar.style.width = `${(answered / questions.length) * 100}%`;
      currentNumber.textContent = q.id;
      answeredCount.textContent = answered;

      questionTitle.textContent = q.question;
      questionContext.textContent = q.context;

      optionsEl.innerHTML = "";
      q.options.forEach((option, i) => {
        const div = document.createElement("div");
        div.className = "option";
        if (answers[current] === i) div.classList.add("selected");
        div.textContent = `${String.fromCharCode(65 + i)}) ${option}`;
        div.onclick = () => {
          answers[current] = i;
          render();
        };
        optionsEl.appendChild(div);
      });

      prevBtn.disabled = current === 0;
      nextBtn.disabled = current === questions.length - 1;

      renderPalette();
    }

    function finishExam() {
      const blank = answers.filter(a => a === null).length;
      if (blank > 0) {
        const ok = confirm(`Você ainda deixou ${blank} questão(ões) em branco. Deseja finalizar mesmo assim?`);
        if (!ok) return;
      }

      const correct = answers.reduce((total, answer, i) => {
        return total + (answer === questions[i].answer ? 1 : 0);
      }, 0);

      const wrong = answers.reduce((total, answer, i) => {
        return total + (answer !== null && answer !== questions[i].answer ? 1 : 0);
      }, 0);

      const percent = Math.round((correct / questions.length) * 100);

      document.getElementById("scoreTotal").textContent = correct;
      document.getElementById("wrongTotal").textContent = wrong;
      document.getElementById("blankTotal").textContent = blank;
      document.getElementById("percentTotal").textContent = `${percent}%`;

      const review = document.getElementById("review");
      review.innerHTML = "";

      questions.forEach((q, i) => {
        if (answers[i] !== q.answer) {
          const item = document.createElement("div");
          item.className = "review-item";
          const userAnswer = answers[i] === null ? "Em branco" : `${String.fromCharCode(65 + answers[i])}) ${q.options[answers[i]]}`;
          const correctAnswer = `${String.fromCharCode(65 + q.answer)}) ${q.options[q.answer]}`;

          item.innerHTML = `
            <strong>Questão ${q.id} - ${q.area}</strong>
            <div>Sua resposta: <span class="wrong">${userAnswer}</span></div>
            <div>Resposta correta: <span class="correct">${correctAnswer}</span></div>
            <div>${q.explanation}</div>
          `;
          review.appendChild(item);
        }
      });

      if (!review.innerHTML) {
        review.innerHTML = `<div class="review-item"><strong>Perfeito!</strong>Você acertou todas as questões.</div>`;
      }

      exam.style.display = "none";
      sidebar.style.display = "none";
      result.style.display = "block";
      window.scrollTo({ top: 0, behavior: "smooth" });
    }

    prevBtn.onclick = () => {
      if (current > 0) {
        current--;
        render();
      }
    };

    nextBtn.onclick = () => {
      if (current < questions.length - 1) {
        current++;
        render();
      }
    };

    finishBtn.onclick = finishExam;

    restartBtn.onclick = () => {
      current = 0;
      answers = Array(questions.length).fill(null);
      result.style.display = "none";
      exam.style.display = "block";
      sidebar.style.display = "block";
      render();
      window.scrollTo({ top: 0, behavior: "smooth" });
    };

    render();
  </script>
